<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venice AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; }
    .login-container, .chat-container { max-width: 800px; margin: auto; }
  </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center">
  
  <!-- Pantalla de Login -->
  <div id="loginScreen" class="login-container glass p-10 rounded-3xl border border-pink-500/30">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-pink-500">Venice AI</h1>
      <p class="text-gray-400 mt-2">Acceso Privado</p>
    </div>
    
    <div class="space-y-5">
      <div>
        <label class="block text-sm mb-2">Usuario</label>
        <input id="username" type="text" 
               class="w-full bg-zinc-900 rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-pink-500"
               placeholder="Usuario">
      </div>
      <div>
        <label class="block text-sm mb-2">Contraseña</label>
        <input id="password" type="password" 
               class="w-full bg-zinc-900 rounded-2xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-pink-500"
               placeholder="Contraseña">
      </div>
      <button onclick="login()" 
              class="w-full bg-pink-600 hover:bg-pink-700 py-4 rounded-2xl font-semibold text-lg transition">
        Ingresar
      </button>
    </div>
  </div>

  <!-- Chat (oculto al inicio) -->
  <div id="chatScreen" class="chat-container hidden flex-col h-screen">
    <div class="text-center py-4 border-b border-gray-800 bg-black/50">
      <h1 class="text-2xl font-semibold">Venice AI</h1>
    </div>

    <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-6"></div>

    <div class="p-4 border-t border-gray-800 bg-black/50">
      <div class="flex gap-3">
        <input 
          id="promptInput" 
          type="text" 
          class="flex-1 bg-zinc-900 rounded-full px-6 py-4 focus:outline-none focus:ring-2 focus:ring-pink-500"
          placeholder="Describe lo que quieres generar..."
          onkeypress="if(event.key === 'Enter') generarImagen()">
        <button 
          onclick="generarImagen()"
          class="bg-pink-600 hover:bg-pink-700 px-10 rounded-full font-medium transition">
          Generar
        </button>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = "VENICE_ADMIN_KEY_4OHVqVKfs0hOmWYTWzlzM3g6NbJtNO72RY1L3viahS";
    const CORRECT_PASSWORD = "43555938";

    function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (username === CORRECT_PASSWORD && password === CORRECT_PASSWORD) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('chatScreen').classList.remove('hidden');
        addMessage("Bienvenido. Puedes comenzar a generar imágenes.", false);
      } else {
        alert("Usuario o contraseña incorrectos");
      }
    }

    function addMessage(text, isUser = false) {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message flex ${isUser ? 'justify-end' : 'justify-start'}`;
      div.innerHTML = `
        <div class="bubble max-w-[85%] ${isUser ? 'bg-pink-600 text-white' : 'bg-zinc-800 text-white'} rounded-3xl px-6 py-3">
          ${text}
        </div>
      `;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function generarImagen() {
      const input = document.getElementById('promptInput');
      const userText = input.value.trim();
      
      if (!userText) return;

      addMessage(userText, true);
      input.value = "";

      const loadingId = 'loading-' + Date.now();
      const messages = document.getElementById('messages');
      messages.innerHTML += `
        <div id="${loadingId}" class="flex justify-start">
          <div class="bubble bg-zinc-800 px-6 py-3">Generando imagen... ⏳</div>
        </div>`;
      messages.scrollTop = messages.scrollHeight;

      const fullPrompt = "fotorealista, ultra detallado, 8k, piel realista, iluminación cinematográfica, " + 
                        userText + ", hombre gay, escena explícita, detalle anatómico extremo";

      try {
        const res = await fetch("https://api.venice.ai/api/v1/image/generate", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${API_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "flux-uncensored",
            prompt: fullPrompt,
            negative_prompt: "woman, female, child, blurry, deformed, low quality, text, watermark, clothes",
            width: 1024,
            height: 1024,
            format: "webp",
            hide_watermark: true,
            nsfw: true
          })
        });

        const data = await res.json();
        document.getElementById(loadingId).remove();

        if (res.ok && data.images && data.images[0]) {
          const imgSrc = `data:image/webp;base64,${data.images[0]}`;
          messages.innerHTML += `
            <div class="flex justify-start">
              <div class="bubble bg-zinc-800 p-3 rounded-3xl">
                <img src="${imgSrc}" class="rounded-2xl max-w-full">
              </div>
            </div>`;
        } else {
          addMessage("❌ Error al generar la imagen.", false);
        }
      } catch (err) {
        document.getElementById(loadingId).remove();
        addMessage("❌ Error de conexión.", false);
      }
      
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
