<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venice AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; }
    .chat-container { max-width: 800px; margin: auto; height: 90vh; display: flex; flex-direction: column; }
  </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center">
  
  <!-- Login -->
  <div id="loginScreen" class="max-w-md w-full p-10 rounded-3xl border border-pink-500/30 bg-zinc-950">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-pink-500">Venice AI</h1>
      <p class="text-gray-400 mt-2">Acceso Privado</p>
    </div>
    <input id="username" type="text" placeholder="Usuario" class="w-full mb-4 bg-zinc-900 rounded-2xl px-6 py-4">
    <input id="password" type="password" placeholder="Contraseña" class="w-full mb-6 bg-zinc-900 rounded-2xl px-6 py-4">
    <button onclick="login()" class="w-full bg-pink-600 py-4 rounded-2xl font-semibold">Ingresar</button>
  </div>

  <!-- Chat -->
  <div id="chatScreen" class="chat-container hidden flex-col h-screen">
    <div class="text-center py-4 border-b border-gray-800">
      <h1 class="text-2xl font-semibold">Venice AI</h1>
    </div>

    <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-6"></div>

    <div class="p-4 border-t border-gray-800">
      <div class="flex gap-3">
        <input id="promptInput" type="text" class="flex-1 bg-zinc-900 rounded-full px-6 py-4" 
               placeholder="Describe lo que quieres generar..." onkeypress="if(event.key === 'Enter') generarImagen()">
        <button onclick="generarImagen()" class="bg-pink-600 px-10 rounded-full font-medium">Generar</button>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = "VENICE_ADMIN_KEY_4OHVqVKfs0hOmWYTWzlzM3g6NbJtNO72RY1L3viahS";
    const CORRECT_PASS = "43555938";

    function login() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      if (user === CORRECT_PASS && pass === CORRECT_PASS) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('chatScreen').classList.remove('hidden');
        addMessage("Bienvenido. Describe lo que quieres generar.", false);
      } else {
        alert("Usuario o contraseña incorrectos");
      }
    }

    function addMessage(text, isUser = false) {
      const div = document.createElement('div');
      div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
      div.innerHTML = `<div class="max-w-[80%] px-6 py-3 rounded-3xl ${isUser ? 'bg-pink-600' : 'bg-zinc-800'}">${text}</div>`;
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = 99999;
    }

    async function generarImagen() {
      const input = document.getElementById('promptInput');
      const userText = input.value.trim();
      if (!userText) return;

      addMessage(userText, true);
      input.value = "";

      const loadingId = 'load-' + Date.now();
      document.getElementById('messages').innerHTML += `
        <div id="${loadingId}" class="flex justify-start">
          <div class="bg-zinc-800 px-6 py-3 rounded-3xl">Generando... ⏳</div>
        </div>`;

      // Prompt optimizado
      const fullPrompt = `fotorealista, ultra detallado, 8k, piel realista, ${userText}, hombre gay, escena explícita, detalle anatómico extremo, pene visible`;

      try {
        const res = await fetch("https://api.venice.ai/api/v1/image/generate", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${API_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "flux-dev",           // ← Cambiado a modelo más estable
            prompt: fullPrompt,
            negative_prompt: "woman, female, child, blurry, deformed, low quality, text, watermark, clothes",
            width: 1024,
            height: 1024,
            format: "webp",
            hide_watermark: true,
            nsfw: true
          })
        });

        const data = await res.json();
        document.getElementById(loadingId).remove();

        if (res.ok && data.images && data.images[0]) {
          const imgSrc = `data:image/webp;base64,${data.images[0]}`;
          document.getElementById('messages').innerHTML += `
            <div class="flex justify-start">
              <div class="bg-zinc-800 p-3 rounded-3xl">
                <img src="${imgSrc}" class="rounded-2xl max-w-full">
              </div>
            </div>`;
        } else {
          addMessage(`❌ Error: ${data.error || data.message || "Inténtalo de nuevo"}`, false);
        }
      } catch (e) {
        document.getElementById(loadingId).remove();
        addMessage("❌ Error de conexión. Revisa tu internet.", false);
      }
    }
  </script>
</body>
</html>
